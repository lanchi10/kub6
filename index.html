

<!DOCTYPE html><html lang="he" dir="rtl"><head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"> <title>קובייה של רגשות</title> <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet"> <style> *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; } :root { --cube-size: min(280px, 52vmin); --half: calc(var(--cube-size) / 2); --radius: 22px; --text: #5a7d95; } html, body { width: 100%; height: 100%; overflow: hidden; } body { display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(150deg, #ddeef6 0%, #cfe0ec 100%); font-family: 'Heebo', 'Segoe UI', Arial, sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; }

.settings-panel h3 { font-size: 1.15rem; font-weight: 700; color: var(--text); border-bottom: 2px solid #e8f0f6; padding-bottom: 8px; } .section-label { font-size: 0.8rem; font-weight: 700; color: #aac; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: -8px; }

.setting-row { display: flex; flex-direction: column; gap: 6px; } .setting-row label { display: flex; justify-content: space-between; align-items: center; font-size: 0.93rem; color: #446378; } .setting-row label .val { font-weight: 700; background: #e8f0f6; padding: 2px 8px; border-radius: 6px; font-size: 0.86rem; } .setting-row input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: linear-gradient(90deg, #74b9c8, #a8d8e8); border-radius: 3px; cursor: pointer; outline: none; } .setting-row input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: var(--text); border-radius: 50%; box-shadow: 0 2px 6px rgba(0,0,0,0.2); cursor: pointer; }

/* ── 3D Scene ── */ .scene { position: relative; z-index: 1; width: var(--cube-size); height: var(--cube-size); perspective: calc(var(--cube-size) * 3.2); cursor: grab; touch-action: none; flex-shrink: 0; } .scene.dragging { cursor: grabbing; }

.cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transform: rotateX(-22deg) rotateY(32deg); }

.face { position: absolute; inset: 0; width: var(--cube-size); height: var(--cube-size); border-radius: var(--radius); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; backface-visibility: hidden; -webkit-backface-visibility: hidden; border: 3px solid rgba(255,255,255,0.72); overflow: hidden; box-shadow: inset 0 0 50px rgba(255,255,255,0.4); transition: border-color 0.3s, filter 0.3s, box-shadow 0.3s; } .face.selected { border-color: white; box-shadow: inset 0 0 50px rgba(255,255,255,0.55), 0 0 0 5px rgba(255,255,255,0.9), 0 0 40px rgba(255,255,255,0.7); filter: brightness(1.12); } .face::after { content: ''; position: absolute; inset: 0; border-radius: var(--radius); background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.55) 50%, transparent 70%); transform: translateX(-150%); transition: none; } .face.settling::after { transform: translateX(150%); transition: transform 0.65s ease; }

.emotion-img { width: 72%; height: 72%; object-fit: contain; border-radius: 14px; pointer-events: none; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.18)); } .face-label { font-size: clamp(1rem, 3vmin, 1.35rem); font-weight: 700; color: rgba(0,0,0,0.55); letter-spacing: 0.04em; pointer-events: none; text-shadow: 0 1px 3px rgba(255,255,255,0.6); }

.face-front { transform: translateZ(var(--half)); background: linear-gradient(135deg,#FFE082,#FFCA28); } .face-back { transform: rotateY(180deg) translateZ(var(--half)); background: linear-gradient(135deg,#90CAF9,#64B5F6); } .face-right { transform: rotateY(90deg) translateZ(var(--half)); background: linear-gradient(135deg,#EF9A9A,#E57373); } .face-left { transform: rotateY(-90deg) translateZ(var(--half)); background: linear-gradient(135deg,#FFCC80,#FFA726); } .face-top { transform: rotateX(90deg) translateZ(var(--half)); background: linear-gradient(135deg,#CE93D8,#BA68C8); } .face-bottom { transform: rotateX(-90deg) translateZ(var(--half)); background: linear-gradient(135deg,#A5D6A7,#66BB6A); }

/* ── sound wave indicator ── */ .sound-wave { position: fixed; bottom: 36px; right: 16px; z-index: 1; display: flex; align-items: flex-end; gap: 3px; height: 26px; opacity: 0; transition: opacity 0.3s; } .sound-wave.show { opacity: 1; } .sound-wave span { display: block; width: 4px; background: #74b9c8; border-radius: 2px; animation: wave-bar 0.7s ease-in-out infinite alternate; } .sound-wave span:nth-child(1) { height: 8px; animation-delay: 0s; } .sound-wave span:nth-child(2) { height: 18px; animation-delay: .1s; } .sound-wave span:nth-child(3) { height: 24px; animation-delay: .2s; } .sound-wave span:nth-child(4) { height: 14px; animation-delay: .3s; } .sound-wave span:nth-child(5) { height: 8px; animation-delay: .15s; } @keyframes wave-bar { to { transform: scaleY(0.3); } }

.spin-indicator { position: relative; z-index: 1; margin-top: clamp(14px,3vh,28px); width: 44px; height: 44px; opacity: 0; transition: opacity 0.3s; } .spin-indicator.show { opacity: 1; } .spin-indicator svg { animation: spin-ring 1s linear infinite; } @keyframes spin-ring { to { transform: rotate(360deg); } }


.hint { position: fixed; bottom: 14px; inset-inline: 0; text-align: center; font-size: clamp(0.7rem,2vmin,0.82rem); color: #9ab8cc; font-weight: 300; pointer-events: none; z-index: 1; transition: opacity 0.4s; } </style></head><body>

<canvas id="fireworksCanvas"></canvas>

<button class="spin-now-btn" id="manualSpinBtn">🎲 גלגל קובייה!</button>

<div class="overlay" id="overlay"></div>

<div class="settings-panel" id="settingsPanel"> <h3>⚙️ הגדרות מרפא/ה בעיסוק</h3>

<div class="toggle-row"> <label class="switch"><input type="checkbox" id="autoRotateToggle"><span class="slider-sw"></span></label> <span>סיבוב אוטומטי רנדומלי</span> </div>

<div class="setting-row"> <label><span>המתנה בין סיבובים</span><span class="val" id="dwellVal">4 שנ׳</span></label> <input type="range" id="dwellSlider" min="1" max="12" step="0.5" value="4"> </div>

<div class="setting-row"> <label><span>מהירות סיבוב</span><span class="val" id="speedVal">בינונית</span></label> <input type="range" id="speedSlider" min="1" max="5" step="1" value="3"> </div>

<div class="row2"> <div class="setting-row" style="flex:1"> <label><span>זיקוקים</span></label> <select id="fireworksIntensity" class="select-field"> <option value="0">כבוי</option> <option value="1">עדין</option> <option value="2" selected>רגיל</option> <option value="3">חגיגי</option> </select> </div> </div>

<div class="section-label">תצוגה מקדימה — לחץ להשמעה</div> <div class="preview-grid" id="previewGrid"></div>

<button class="close-btn" id="closeSettingsBtn">סגור</button></div>

<h1 class="app-title" id="appTitle">איך אתה מרגיש?</h1>

<div class="scene" id="scene"> <div class="cube-glow" id="cubeGlow"></div> <div class="cube" id="cube">
  <div class="face face-front"  data-emotion="שמח"  data-emoji="😊"><img class="emotion-img" src="happy.png" alt="שמח"><span class="face-label">שמח</span></div>
  <div class="face face-back"   data-emotion="עצוב" data-emoji="😞"><img class="emotion-img" src="sad.png"   alt="עצוב"><span class="face-label">עצוב</span></div>
  <div class="face face-right"  data-emotion="כועס" data-emoji="😠"><img class="emotion-img" src="angry.png" alt="כועס"><span class="face-label">כועס</span></div>
  <div class="face face-left"   data-emotion="צוחק" data-emoji="😂"><img class="emotion-img" src="laugh.png" alt="צוחק"><span class="face-label">צוחק</span></div>
  <div class="face face-top"    data-emotion="בוכה" data-emoji="😭"><img class="emotion-img" src="cry.png"   alt="בוכה"><span class="face-label">בוכה</span></div>
  <div class="face face-bottom" data-emotion="עייף" data-emoji="😴"><img class="emotion-img" src="tired.png" alt="עייף"><span class="face-label">עייף</span></div>
</div></div>

<div class="spin-indicator" id="spinIndicator"> <svg width="44" height="44" viewBox="0 0 44 44"> <circle cx="22" cy="22" r="18" fill="none" stroke="#90caf9" stroke-width="3" stroke-dasharray="80 30" stroke-linecap="round"/> </svg></div>

<p class="hint" id="hintText">גרור לסיבוב &nbsp;•&nbsp; לחץ על פרצוף לבחירה</p>

<script>'use strict';

const audioLaugh = new Audio('A1.mp3');
const audioCry   = new Audio('A2.mp3');

/* ═══════════════════════════════════════════ DOM refs ═══════════════════════════════════════════ */
const cube = document.getElementById('cube');
const scene = document.getElementById('scene');
const cubeGlow = document.getElementById('cubeGlow');
const spinInd = document.getElementById('spinIndicator');
const canvas = document.getElementById('fireworksCanvas');
const ctx = canvas.getContext('2d');
const soundWave = document.getElementById('soundWave');

const hintText = document.getElementById('hintText');
const appTitle = document.getElementById('appTitle');
const settingsBtn = document.getElementById('settingsBtn');
const settingsPanel = document.getElementById('settingsPanel');
const overlay = document.getElementById('overlay');
const closeBtn = document.getElementById('closeSettingsBtn');
const autoToggle = document.getElementById('autoRotateToggle');
const dwellSlider = document.getElementById('dwellSlider');
const speedSlider = document.getElementById('speedSlider');
const dwellVal = document.getElementById('dwellVal');
const speedVal = document.getElementById('speedVal');
const fxSelect = document.getElementById('fireworksIntensity');
const soundToggle = document.getElementById('soundToggle');
const volSlider = document.getElementById('volumeSlider');
const volVal = document.getElementById('volumeVal');
const spinNowBtn = document.getElementById('spinNowBtn');
const manualSpinBtn = document.getElementById('manualSpinBtn');
const previewGrid = document.getElementById('previewGrid');

/* ═══════════════════════════════════════════ מצב ═══════════════════════════════════════════ */
let rotX = -22, rotY = 32;
let isDragging = false, hasDragged = false, lastX = 0, lastY = 0;
let activeFace = null;
let activeFaceIdx = -1;
let manualFaceIdx = -1;
let isAnimating = false;
let autoTimer = null;

let isAutoEnabled = false;
let dwellMs = 4000;
let spinDuration = 2100;
let fxIntensity = 2;
let soundEnabled = true;
let masterVolume = 0.7;

const SENSITIVITY = 0.50;
const SPEED_DUR = { 1:3500, 2:2800, 3:2100, 4:1400, 5:900 };
const SPEED_LBL = { 1:'איטי', 2:'איטי-בינוני', 3:'בינונית', 4:'מהיר', 5:'מהיר מאוד' };

const FACE_ANGLES = [
  { x:  0, y:   0 }, // 0 front  — שמח  (happy.png)
  { x:  0, y: 180 }, // 1 back   — עצוב (sad.png)
  { x:  0, y: -90 }, // 2 right  — כועס (angry.png)
  { x:  0, y:  90 }, // 3 left   — צוחק (laugh.png)
  { x:-90, y:   0 }, // 4 top    — בוכה (cry.png)
  { x: 90, y:   0 }, // 5 bottom — עייף (tired.png)
];

/* ═══════════════════════════════════════════ Web Audio ═══════════════════════════════════════════ */
let audioCtx = null, masterGain = null;
let spinSource = null, spinGain = null;

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = soundEnabled ? masterVolume : 0;
    masterGain.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function tone(freq, start, dur, type = 'sine', vol = 0.28, detune = 0) {
  if (!soundEnabled) return;
  const ac = ensureAudio();
  const osc = ac.createOscillator();
  const g = ac.createGain();
  osc.type = type; osc.frequency.value = freq; osc.detune.value = detune;
  const t = ac.currentTime + start;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.015);
  g.gain.setValueAtTime(vol, t + Math.max(0, dur - 0.05));
  g.gain.linearRampToValueAtTime(0, t + dur);
  osc.connect(g); g.connect(masterGain);
  osc.start(t); osc.stop(t + dur + 0.06);
}

function playSpinWhoosh(ms) {
  if (!soundEnabled) return;
  const ac = ensureAudio();
  masterGain.gain.cancelScheduledValues(ac.currentTime);
  masterGain.gain.setValueAtTime(soundEnabled ? masterVolume : 0, ac.currentTime);
  const dur = ms / 1000;
  const sr = ac.sampleRate;
  const buf = ac.createBuffer(1, Math.ceil(sr * (dur + 0.2)), sr);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;

  spinSource = ac.createBufferSource();
  spinSource.buffer = buf;

  const filt = ac.createBiquadFilter();
  filt.type = 'bandpass'; filt.Q.value = 1.2;

  spinGain = ac.createGain();
  const t = ac.currentTime;

  filt.frequency.setValueAtTime(100, t);
  filt.frequency.linearRampToValueAtTime(700, t + dur * 0.35);
  filt.frequency.linearRampToValueAtTime(900, t + dur * 0.55);
  filt.frequency.linearRampToValueAtTime(200, t + dur * 0.82);
  filt.frequency.linearRampToValueAtTime(80, t + dur);

  spinGain.gain.setValueAtTime(0, t);
  spinGain.gain.linearRampToValueAtTime(0.35, t + 0.12);
  spinGain.gain.setValueAtTime(0.35, t + dur - 0.35);
  spinGain.gain.linearRampToValueAtTime(0, t + dur);

  spinSource.connect(filt); filt.connect(spinGain); spinGain.connect(masterGain);
  spinSource.start(t); spinSource.stop(t + dur + 0.2);
}

function stopSpinWhoosh() {
  if (spinGain && audioCtx) {
    try { spinGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1); } catch(e){}
  }
}

function stopAllAudio() {
  audioLaugh.pause(); audioLaugh.currentTime = 0;
  audioCry.pause();   audioCry.currentTime = 0;
  if (masterGain && audioCtx) {
    try { masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1); } catch(e) {}
  }
}

/* ═══════════════════════════════════════════ מנגינות רגשות ═══════════════════════════════════════════ */

/* שמח 😊 */
function playHappy() {
  const notes = [[523,0,.14],[659,.13,.14],[784,.26,.14],[1047,.39,.3]];
  notes.forEach(([f,s,d]) => tone(f,s,d,'sine',0.3));
  [[1047,.7,.07],[1175,.78,.07],[1319,.86,.1],[1047,.98,.28]].forEach(([f,s,d]) => tone(f,s,d,'sine',0.2));
}

/* עצוב 😞 — tired.png — איטי, מינורי, יורד */
function playSad() {
  tone(440,0,.75,'sine',0.24); tone(392,.7,.75,'sine',0.22);
  tone(330,1.4,.85,'sine',0.19); tone(262,2.2,1.2,'sine',0.15);
  const ac = ensureAudio();
  const t = ac.currentTime + 0.4;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = 'sine'; o.frequency.setValueAtTime(300,t); o.frequency.linearRampToValueAtTime(200,t+1);
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.12,t+0.15); g.gain.linearRampToValueAtTime(0,t+1);
  o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+1.1);
}

/* כועס 😠 */
function playAngry() {
  tone(220,0,.4,'sawtooth',0.28); tone(311,.03,.4,'sawtooth',0.24);
  [0,.38,.54,.68,.82].forEach(s => tone(165,s,.1,'square',0.32));
  tone(220,.95,.5,'sawtooth',0.2);
  const ac = ensureAudio();
  const t = ac.currentTime + 1.45;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = 'sawtooth'; o.frequency.value = 110;
  g.gain.setValueAtTime(0.3,t); g.gain.linearRampToValueAtTime(0,t+0.25);
  o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.3);
}

/* צוחק 😂 — A1.mp3 */
function playLaughMp3() {
  if (!soundEnabled) return;
  audioLaugh.volume = masterVolume;
  audioLaugh.currentTime = 0;
  audioLaugh.play().catch(e => console.warn('Audio play blocked:', e));
}

/* בוכה 😭 — A2.mp3 */
function playCryMp3() {
  if (!soundEnabled) return;
  audioCry.volume = masterVolume;
  audioCry.currentTime = 0;
  audioCry.play().catch(e => console.warn('Audio play blocked:', e));
}

/* עייף 😴 — cry.png (Zzz) — נמוך, איטי, פיהוק */
function playTired() {
  tone(196,0,.95,'sine',0.28); tone(175,.9,.95,'sine',0.24); tone(147,1.8,1.4,'sine',0.2);
  if (!soundEnabled) return;
  const ac = ensureAudio();
  const t = ac.currentTime + 0.3;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(120,t);
  o.frequency.linearRampToValueAtTime(220,t+0.7);
  o.frequency.linearRampToValueAtTime(100,t+1.7);
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.2,t+0.2); g.gain.linearRampToValueAtTime(0,t+1.8);
  o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+1.9);
}

/* EMOTIONS_DEF — סדר תואם ל-FACE_ANGLES (0=front … 5=bottom) */
const EMOTIONS_DEF = [
  { name:'שמח',  emoji:'😊', sound: playHappy    },
  { name:'בוכה', emoji:'😭', sound: playCryMp3   }, // תיקון: צליל בכי לפרצוף בוכה
  { name:'כועס', emoji:'😠', sound: playAngry    },
  { name:'צוחק', emoji:'😂', sound: playLaughMp3 },
  { name:'עצוב', emoji:'😞', sound: playSad      },
  { name:'עייף', emoji:'😴', sound: playTired    }, // תיקון: "עייף" חוזר לצליל הממוחשב
];

const SOUND_MAP = {};
EMOTIONS_DEF.forEach(e => { SOUND_MAP[e.name] = e.sound; });

/* ═══════════════════════════════════════════ Canvas — זיקוקים ═══════════════════════════════════════════ */
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

let particles = [], fxRaf = null;
const COLORS = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8','#f06595','#74c0fc','#ffec99','#ffffff'];

class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    const sp = (4 + Math.random() * 7) * fxIntensity;
    const a = Math.random() * Math.PI * 2;
    this.vx = Math.cos(a) * sp; this.vy = Math.sin(a) * sp - 2;
    this.r = 2.5 + Math.random() * 3.5; this.alpha = 1;
    this.decay = 0.013 + Math.random() * 0.01; this.gravity = 0.13;
    this.color = color; this.trail = [];
  }
  update() {
    this.trail.push({x:this.x, y:this.y});
    if (this.trail.length > 7) this.trail.shift();
    this.vy += this.gravity; this.x += this.vx; this.y += this.vy; this.alpha -= this.decay;
  }
  draw() {
    ctx.save();
    this.trail.forEach((p, i) => {
      ctx.globalAlpha = (i / this.trail.length) * this.alpha * 0.4;
      ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(p.x, p.y, this.r * 0.4, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color;
    ctx.shadowBlur = 14; ctx.shadowColor = this.color;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function launchFireworks() {
  if (fxIntensity === 0) return;
  const r = scene.getBoundingClientRect();
  const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
  const cnt = [0, 30, 60, 100][fxIntensity];
  const bursts = [0, 1, 2, 3][fxIntensity];
  for (let b = 0; b < bursts; b++) {
    setTimeout(() => {
      const ox = cx + (Math.random()-.5)*130*fxIntensity;
      const oy = cy + (Math.random()-.5)*90 *fxIntensity;
      const col = COLORS[Math.floor(Math.random()*COLORS.length)];
      for (let i = 0; i < cnt; i++) particles.push(new Particle(ox, oy, col));
    }, b * 200);
  }
  if (!fxRaf) fxRaf = requestAnimationFrame(fxLoop);
}

function fxLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.alpha > 0.02);
  particles.forEach(p => { p.update(); p.draw(); });
  fxRaf = particles.length > 0 ? requestAnimationFrame(fxLoop) : null;
}

/* ═══════════════════════════════════════════ בחירת פאה ═══════════════════════════════════════════ */
function selectFace(faceEl, idx) {
  if (!faceEl) return;
  if (activeFace) activeFace.classList.remove('selected');
  activeFace = faceEl;
  activeFaceIdx = (idx !== undefined) ? idx : Array.from(document.querySelectorAll('.face')).indexOf(faceEl);
  faceEl.classList.add('selected');
  faceEl.classList.remove('settling');
  requestAnimationFrame(() => faceEl.classList.add('settling'));
  setTimeout(() => faceEl.classList.remove('settling'), 750);
}

/* ═══════════════════════════════════════════ אנימציית סיבוב ═══════════════════════════════════════════ */
let animStart, animFromX, animFromY, animToX, animToY, animDur, animTarget;

function easeOutQuint(t) { return 1 - Math.pow(1-t, 5); }
function easeInQuint(t) { return t * t * t * t * t; }

function spinEase(t) {
  if (t < 0.55) return easeInQuint(t / 0.55) * 0.72;
  return 0.72 + easeOutQuint((t - 0.55) / 0.45) * 0.28;
}

function setSpinButtonsDisabled(val) {
  spinNowBtn.disabled = val;
  manualSpinBtn.disabled = val;
}

function animateSpin(ts) {
  if (!animStart) animStart = ts;
  const raw = Math.min((ts - animStart) / animDur, 1);
  const ease = spinEase(raw);

  rotX = animFromX + (animToX - animFromX) * ease;
  rotY = animFromY + (animToY - animFromY) * ease;
  cube.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;

  if (raw < 1) {
    requestAnimationFrame(animateSpin);
  } else {
    rotX = animToX; rotY = animToY;
    isAnimating = false;
    spinInd.classList.remove('show');
    cubeGlow.classList.remove('active');
    setSpinButtonsDisabled(false);
    soundWave.classList.remove('show');

    const faces = document.querySelectorAll('.face');
    if (animTarget !== undefined) {
      selectFace(faces[animTarget], animTarget);
      if (soundEnabled) {
        const fn = SOUND_MAP[faces[animTarget].dataset.emotion];
        if (fn) fn();
      }
    }

    launchFireworks();
    scheduleNext();
  }
}

function spinToFace(idx) {
  if (isAnimating) return;
  stopAllAudio();
  isAnimating = true;
  setSpinButtonsDisabled(true);
  spinInd.classList.add('show');
  cubeGlow.classList.add('active');
  soundWave.classList.add('show');
  clearTimeout(autoTimer);

  const target = FACE_ANGLES[idx];
  const extraSpins = 2 + Math.floor(Math.random() * 3);
  const dir = Math.random() < 0.5 ? 1 : -1;

  animFromX = rotX; animFromY = rotY;

  let dY = ((target.y - rotY) % 360 + 360) % 360;
  if (dY > 180) dY -= 360;

  animToX = target.x;
  animToY = rotY + dY + dir * extraSpins * 360;
  animDur = spinDuration;
  animTarget = idx;
  animStart = null;

  playSpinWhoosh(spinDuration);
  requestAnimationFrame(animateSpin);
}

/* סיבוב אוטומטי — פועל רק כשהמצב מאופשר */
function randomSpin() {
  if (!isAutoEnabled || isDragging) return;
  spinToFace(Math.floor(Math.random() * 6));
}

/* סיבוב ידני — עובר לפאה הבאה בסדר (0→1→2→3→4→5→0…) */
function triggerSequentialSpin() {
  if (isDragging || isAnimating) return;
  ensureAudio();
  manualFaceIdx = (manualFaceIdx + 1) % 6;
  spinToFace(manualFaceIdx);
}

function scheduleNext() {
  if (isAutoEnabled) autoTimer = setTimeout(randomSpin, dwellMs);
}

/* ═══════════════════════════════════════════ Pointer — גרירה ובחירה ═══════════════════════════════════════════ */
scene.addEventListener('pointerdown', (e) => {
  ensureAudio();
  stopAllAudio();
  if (isAnimating) {
    stopSpinWhoosh();
    isAnimating = false;
    spinInd.classList.remove('show');
    cubeGlow.classList.remove('active');
    soundWave.classList.remove('show');
    setSpinButtonsDisabled(false);
  }
  isDragging = true; hasDragged = false;
  lastX = e.clientX; lastY = e.clientY;
  cube.style.transition = 'none';
  scene.setPointerCapture(e.pointerId);
  scene.classList.add('dragging');
  clearTimeout(autoTimer);
  e.preventDefault();
});

scene.addEventListener('pointermove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  if (Math.abs(dx) > 4 || Math.abs(dy) > 4) hasDragged = true;
  rotY += dx * SENSITIVITY; rotX -= dy * SENSITIVITY;
  lastX = e.clientX; lastY = e.clientY;
  cube.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
});

scene.addEventListener('pointerup', (e) => {
  scene.classList.remove('dragging');
  isDragging = false;
  if (!hasDragged) {
    let t = e.target;
    while (t && t !== scene) {
      if (t.classList.contains('face')) {
        selectFace(t);
        if (soundEnabled) { const fn = SOUND_MAP[t.dataset.emotion]; if (fn) fn(); }
        break;
      }
      t = t.parentElement;
    }
  }
  scheduleNext();
});

scene.addEventListener('pointercancel', () => {
  isDragging = false;
  scene.classList.remove('dragging');
  scheduleNext();
});

/* ═══════════════════════════════════════════ פאנל הגדרות ═══════════════════════════════════════════ */
function openSettings() {
  settingsPanel.style.display = 'flex';
  overlay.classList.add('active');
  requestAnimationFrame(() => settingsPanel.classList.add('active'));
}
function closeSettings() {
  settingsPanel.classList.remove('active');
  overlay.classList.remove('active');
  setTimeout(() => { settingsPanel.style.display = 'none'; }, 260);
}
settingsBtn.addEventListener('click', openSettings);
closeBtn.addEventListener('click', closeSettings);
overlay.addEventListener('click', closeSettings);

autoToggle.addEventListener('change', e => {
  isAutoEnabled = e.target.checked;
  clearTimeout(autoTimer);
  if (isAutoEnabled) scheduleNext();
});

dwellSlider.addEventListener('input', e => {
  dwellMs = parseFloat(e.target.value) * 1000;
  dwellVal.textContent = `${e.target.value} שנ׳`;
});

speedSlider.addEventListener('input', e => {
  const v = parseInt(e.target.value);
  spinDuration = SPEED_DUR[v];
  speedVal.textContent = SPEED_LBL[v];
});

fxSelect.addEventListener('change', e => { fxIntensity = parseInt(e.target.value); });

soundToggle.addEventListener('change', e => {
  soundEnabled = e.target.checked;
  if (masterGain) masterGain.gain.value = soundEnabled ? masterVolume : 0;
});

volSlider.addEventListener('input', e => {
  masterVolume = parseInt(e.target.value) / 100;
  volVal.textContent = `${e.target.value}%`;
  if (masterGain) masterGain.gain.value = soundEnabled ? masterVolume : 0;
  audioLaugh.volume = masterVolume;
  audioCry.volume   = masterVolume;
});

/* כפתור בדיקת סיבוב בהגדרות — עובד תמיד, בחירה רנדומלית */
spinNowBtn.addEventListener('click', () => {
  if (!isAnimating) { ensureAudio(); spinToFace(Math.floor(Math.random() * 6)); }
});

/* כפתור גלגל קובייה! — עובד תמיד, בחירה שונה מהנוכחית */
manualSpinBtn.addEventListener('click', () => { triggerSequentialSpin(); });

/* ═══════════════════════════════════════════ כפתורי תצוגה מקדימה לשמע ═══════════════════════════════════════════ */
EMOTIONS_DEF.forEach(e => {
  const btn = document.createElement('button');
  btn.className = 'preview-btn';
  btn.textContent = `${e.emoji} ${e.name}`;
  btn.addEventListener('click', () => { ensureAudio(); if (e.sound) e.sound(); });
  previewGrid.appendChild(btn);
});

/* ═══════════════════════════════════════════ אתחול ═══════════════════════════════════════════ */
cube.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
</script></body></html>
